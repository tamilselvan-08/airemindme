<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointments - Numen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fb;
        }
    </style>
    <script src="/js/layout.js"></script>
</head>

<body class="bg-gray-50">

    <!-- Sidebar -->
    <div th:replace="~{remindmeui/fragments/layout :: sidebar(activePage='appointments')}"></div>

    <!-- Mobile nav -->
    <div th:replace="~{remindmeui/fragments/layout :: mobileNav(activePage='appointments')}"></div>


    <!-- Main Content -->
    <div class="md:ml-56 min-h-screen pb-24 md:pb-0 pt-14 md:pt-0">
        <div
            class="bg-white border-b border-gray-100 px-4 md:px-6 py-4 flex items-center justify-between sticky top-14 md:top-0 z-20">
            <div>
                <p class="text-xs text-gray-400 mb-1"><a href="home.html" class="hover:text-indigo-600">Home</a> / <span
                        class="text-gray-700">Appointments</span></p>
                <h1 class="text-xl font-bold text-gray-900">Appointments</h1>
            </div>
            <button onclick="openModal('createApptModal')"
                class="flex items-center gap-2 px-4 py-2 rounded-xl bg-indigo-600 text-white text-sm font-medium hover:bg-indigo-700 transition shadow-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                New Appointment
            </button>
        </div>

        <div class="px-4 md:px-6 py-5 max-w-6xl mx-auto">

            <!-- Stats -->
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                <div class="bg-white rounded-2xl p-4 border border-gray-100 shadow-sm">
                    <div class="flex items-center justify-between mb-3">
                        <div class="w-9 h-9 rounded-xl bg-indigo-50 flex items-center justify-center"><svg
                                class="w-4 h-4 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg></div><span id="stat-today-badge"
                            class="text-xs text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-full font-medium">Today</span>
                    </div>
                    <p id="stat-today" class="text-2xl font-bold text-gray-900">3</p>
                    <p class="text-xs text-gray-500 mt-0.5">Today's Appointments</p>
                </div>
                <div class="bg-white rounded-2xl p-4 border border-gray-100 shadow-sm">
                    <div class="flex items-center justify-between mb-3">
                        <div class="w-9 h-9 rounded-xl bg-blue-50 flex items-center justify-center"><svg
                                class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg></div><span
                            class="text-xs text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full font-medium">+5</span>
                    </div>
                    <p id="stat-upcoming" class="text-2xl font-bold text-gray-900">12</p>
                    <p class="text-xs text-gray-500 mt-0.5">Upcoming</p>
                </div>
                <div class="bg-white rounded-2xl p-4 border border-gray-100 shadow-sm">
                    <div class="flex items-center justify-between mb-3">
                        <div class="w-9 h-9 rounded-xl bg-emerald-50 flex items-center justify-center"><svg
                                class="w-4 h-4 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg></div><span
                            class="text-xs text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-full font-medium">+18%</span>
                    </div>
                    <p id="stat-completed" class="text-2xl font-bold text-gray-900">47</p>
                    <p class="text-xs text-gray-500 mt-0.5">Completed</p>
                </div>
                <div class="bg-white rounded-2xl p-4 border border-gray-100 shadow-sm">
                    <div class="flex items-center justify-between mb-3">
                        <div class="w-9 h-9 rounded-xl bg-red-50 flex items-center justify-center"><svg
                                class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M6 18L18 6M6 6l12 12" />
                            </svg></div><span
                            class="text-xs text-red-500 bg-red-50 px-2 py-0.5 rounded-full font-medium">3 this wk</span>
                    </div>
                    <p id="stat-cancelled" class="text-2xl font-bold text-gray-900">5</p>
                    <p class="text-xs text-gray-500 mt-0.5">Cancelled</p>
                </div>
            </div>

            <!-- Search + Filters -->
            <div class="flex flex-col sm:flex-row sm:items-center gap-3 mb-5">
                <div class="relative flex-1">
                    <svg class="w-4 h-4 absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <input id="apptSearch" type="text" placeholder="Search by customer, service..."
                        oninput="filterAppts()"
                        class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="flex items-center gap-2 overflow-x-auto pb-1 sm:pb-0">
                    <button onclick="setApptFilter('all')" id="af-all"
                        class="px-3.5 py-1.5 rounded-full bg-indigo-600 text-white text-sm font-medium whitespace-nowrap">All</button>
                    <button onclick="setApptFilter('today')" id="af-today"
                        class="px-3.5 py-1.5 rounded-full border border-gray-200 text-gray-600 text-sm font-medium whitespace-nowrap hover:border-gray-300">Today</button>
                    <button onclick="setApptFilter('upcoming')" id="af-upcoming"
                        class="px-3.5 py-1.5 rounded-full border border-gray-200 text-gray-600 text-sm font-medium whitespace-nowrap hover:border-gray-300">Upcoming</button>
                    <button onclick="setApptFilter('completed')" id="af-completed"
                        class="px-3.5 py-1.5 rounded-full border border-gray-200 text-gray-600 text-sm font-medium whitespace-nowrap hover:border-gray-300">Completed</button>
                    <button onclick="setApptFilter('cancelled')" id="af-cancelled"
                        class="px-3.5 py-1.5 rounded-full border border-gray-200 text-gray-600 text-sm font-medium whitespace-nowrap hover:border-gray-300">Cancelled</button>
                </div>
            </div>

            <!-- Count label -->
            <p id="appt-count" class="text-sm text-gray-500 mb-4">12 appointments</p>

            <!-- Appointments List -->
            <div id="apptList" class="space-y-3 mb-5"></div>

            <!-- Pagination -->
            <div class="flex items-center justify-between">
                <p id="appt-page-label" class="text-sm text-gray-500">Showing 1–6 of 12</p>
                <div id="appt-pagination" class="flex items-center gap-1"></div>
            </div>
        </div>
    </div>

    <!-- Bottom Nav Mobile -->
    <div
        class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-1 pb-2 pt-1 flex items-end justify-around z-30">
        <a href="home.html" class="flex flex-col items-center gap-0.5 text-gray-400 px-2 py-1"><svg class="w-5 h-5"
                fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg><span class="text-[10px] font-medium">Home</span></a>
        <a href="customers.html" class="flex flex-col items-center gap-0.5 text-gray-400 px-2 py-1"><svg class="w-5 h-5"
                fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg><span class="text-[10px] font-medium">Customers</span></a>
        <div class="relative flex flex-col items-center" style="margin-bottom:8px">
            <button onclick="openModal('createApptModal')"
                class="w-14 h-14 rounded-full bg-indigo-600 text-white flex items-center justify-center shadow-lg shadow-indigo-300 transition-transform active:scale-95 -mt-5">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
            </button>
            <span class="text-[10px] font-medium text-indigo-600 mt-0.5">Add</span>
        </div>

        <!-- Catalog -->
        <a href="/catalog.html" th:classappend="${activePage == 'catalog'} ? 'text-indigo-600' : 'text-gray-400'"
            class="flex flex-col items-center gap-0.5 px-2 py-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
            </svg>
            <span class="text-[10px] font-medium">Catalog</span>
        </a>
        <a href="settings.html" class="flex flex-col items-center gap-0.5 text-gray-400 px-2 py-1"><svg class="w-5 h-5"
                fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg><span class="text-[10px] font-medium">Settings</span></a>
    </div>

    <!-- Create Appointment Modal -->
    <div id="createApptModal" class="hidden fixed inset-0 z-50 flex items-end md:items-center justify-center">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeModal('createApptModal')"></div>
        <div
            class="relative bg-white rounded-t-3xl md:rounded-3xl w-full max-w-md max-h-[95vh] overflow-y-auto shadow-2xl">
            <div class="flex justify-center pt-3 pb-1 md:hidden">
                <div class="w-10 h-1 rounded-full bg-gray-200"></div>
            </div>
            <div class="flex items-center justify-between px-5 pt-4 pb-3">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-2xl bg-indigo-50 flex items-center justify-center"><svg
                            class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg></div>
                    <h2 class="text-lg font-bold text-gray-900">New Appointment</h2>
                </div>
                <button onclick="closeModal('createApptModal')"
                    class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 hover:bg-gray-200"><svg
                        class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg></button>
            </div>
            <form onsubmit="submitAppt(event)" class="px-5 pb-6 flex flex-col gap-4">
                <div><label class="text-sm font-medium text-gray-700 mb-1.5 block">Customer <span
                            class="text-red-500">*</span></label>
                    <div class="relative"><select id="apptCustomer" required
                            class="w-full px-4 py-3 rounded-2xl border border-gray-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 appearance-none">
                            <option value="">Select customer...</option>
                            <option th:each="c : ${customers}" th:value="${c.id}" th:text="${c.name}">
                            </option>
                        </select></div>
                </div>
                <div><label class="text-sm font-medium text-gray-700 mb-1.5 block">Service Name <span
                            class="text-red-500">*</span></label><input type="text" id="apptService"
                        placeholder="e.g. Blood Test, Hair Cut, Consultation" required
                        class="w-full px-4 py-3 rounded-2xl border border-gray-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-gray-400">
                    <div class="flex flex-wrap gap-1.5 mt-2"><button type="button"
                            onclick="document.getElementById('apptService').value='General Consultation'"
                            class="px-3 py-1 rounded-full bg-indigo-50 text-indigo-600 text-xs font-medium hover:bg-indigo-100">Consultation</button><button
                            type="button" onclick="document.getElementById('apptService').value='Blood Test'"
                            class="px-3 py-1 rounded-full bg-indigo-50 text-indigo-600 text-xs font-medium hover:bg-indigo-100">Blood
                            Test</button><button type="button"
                            onclick="document.getElementById('apptService').value='Hair Cut &amp; Style'"
                            class="px-3 py-1 rounded-full bg-indigo-50 text-indigo-600 text-xs font-medium hover:bg-indigo-100">Hair
                            Cut</button><button type="button"
                            onclick="document.getElementById('apptService').value='Follow-up Visit'"
                            class="px-3 py-1 rounded-full bg-indigo-50 text-indigo-600 text-xs font-medium hover:bg-indigo-100">Follow-up</button>
                    </div>
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-700 mb-1.5 block">
                        Assignee / Service Provider
                        <span class="text-gray-400 text-xs font-normal">(optional)</span>
                    </label>

                    <div class="relative">
                        <select id="apptAssignee"
                            class="w-full px-4 py-3 rounded-2xl border border-gray-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 appearance-none">

                            <option value="">-- Unassigned --</option>

                            <option th:each="u : ${users}" th:value="${u.firstName + ' ' + u.lastName}"
                                th:text="${u.firstName + ' ' + u.lastName + ' (' + u.role + ')'}">
                            </option>

                        </select>

                        <svg class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"
                            fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="text-sm font-medium text-gray-700 mb-1.5 block">Date <span
                                class="text-red-500">*</span></label><input type="date" id="apptDate" required
                            class="w-full px-4 py-3 rounded-2xl border border-gray-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div><label class="text-sm font-medium text-gray-700 mb-1.5 block">Time <span
                                class="text-red-500">*</span></label><input type="time" id="apptTime" required
                            class="w-full px-4 py-3 rounded-2xl border border-gray-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>
                <div><label class="text-sm font-medium text-gray-700 mb-2 block">Duration</label>
                    <div class="grid grid-cols-4 gap-2"><button type="button" onclick="selDuration('15 min')"
                            id="dur-15"
                            class="py-2.5 rounded-xl border-2 border-gray-200 text-xs font-semibold text-gray-600 hover:border-indigo-300 transition">15
                            min</button><button type="button" onclick="selDuration('30 min')" id="dur-30"
                            class="py-2.5 rounded-xl border-2 border-indigo-500 bg-indigo-50 text-xs font-semibold text-indigo-700 transition">30
                            min</button><button type="button" onclick="selDuration('45 min')" id="dur-45"
                            class="py-2.5 rounded-xl border-2 border-gray-200 text-xs font-semibold text-gray-600 hover:border-indigo-300 transition">45
                            min</button><button type="button" onclick="selDuration('60 min')" id="dur-60"
                            class="py-2.5 rounded-xl border-2 border-gray-200 text-xs font-semibold text-gray-600 hover:border-indigo-300 transition">60
                            min</button></div><input type="hidden" id="apptDuration" value="30 min">
                </div>
                <div><label class="text-sm font-medium text-gray-700 mb-2 block">Reminder Timing</label>
                    <div class="grid grid-cols-3 gap-2"><button type="button" onclick="selReminder('1hr')" id="rem-1hr"
                            class="py-2.5 rounded-xl border-2 border-indigo-500 bg-indigo-50 text-xs font-semibold text-indigo-700 transition">1
                            hr before</button><button type="button" onclick="selReminder('2hr')" id="rem-2hr"
                            class="py-2.5 rounded-xl border-2 border-gray-200 text-xs font-semibold text-gray-600 hover:border-indigo-300 transition">2
                            hrs before</button><button type="button" onclick="selReminder('1day')" id="rem-1day"
                            class="py-2.5 rounded-xl border-2 border-gray-200 text-xs font-semibold text-gray-600 hover:border-indigo-300 transition">1
                            day before</button></div><input type="hidden" id="apptReminder" value="1hr">
                </div>
                <div><label class="text-sm font-medium text-gray-700 mb-2 block">Notify Via</label>
                    <div class="flex gap-2"><button type="button" onclick="selApptCh('wa')" id="ach-wa"
                            class="flex-1 py-2.5 rounded-full text-sm font-semibold bg-green-500 text-white transition">WhatsApp</button><button
                            type="button" onclick="selApptCh('sms')" id="ach-sms"
                            class="flex-1 py-2.5 rounded-full text-sm font-semibold bg-gray-100 text-gray-600 hover:bg-gray-200 transition">SMS</button><button
                            type="button" onclick="selApptCh('em')" id="ach-em"
                            class="flex-1 py-2.5 rounded-full text-sm font-semibold bg-gray-100 text-gray-600 hover:bg-gray-200 transition">Email</button>
                    </div>
                </div>
                <div><label class="text-sm font-medium text-gray-700 mb-1.5 block">Notes</label><textarea id="apptNotes"
                        placeholder="Any special instructions or notes..." rows="3"
                        class="w-full px-4 py-3 rounded-2xl border border-gray-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none placeholder-gray-400"></textarea>
                </div>
                <button type="submit"
                    class="w-full py-4 rounded-2xl bg-indigo-600 text-white font-semibold flex items-center justify-center gap-2 hover:bg-indigo-700 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    Book Appointment
                </button>
            </form>
        </div>
    </div>

    <!-- Success Toast -->
    <div id="successToast"
        class="hidden fixed bottom-24 md:bottom-6 left-1/2 -translate-x-1/2 z-[60] flex items-center gap-3 px-5 py-3 bg-gray-900 text-white rounded-2xl shadow-2xl">
        <svg class="w-5 h-5 text-emerald-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <p id="toastMsg" class="text-sm font-medium">Appointment booked!</p>
    </div>
    <script th:src="@{/js/theme.js}"></script>
    <script>
        function toggleSub(menuId) {
            const subMenu = document.getElementById('sub-' + menuId);
            const chevron = document.getElementById('ch-' + menuId);

            if (subMenu) {
                // Toggle the hidden class
                const isCollapsed = subMenu.classList.toggle('hidden');

                // Rotate chevron
                if (chevron) {
                    chevron.style.transform = isCollapsed ? 'rotate(0deg)' : 'rotate(180deg)';
                }
            }
        }

        // Logic to keep it open if on the reports page
        window.addEventListener('DOMContentLoaded', () => {
            // You can set this logic based on your activePage variable
            const activePage = "[[${activePage}]]";
            if (activePage === 'reports') {
                toggleSub('reports');
            }
        });
    </script>
    <script>
        // ===================== DATA =====================
        const today = new Date();
        const fmt = (d) => d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
        const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);
        const nextWeek = new Date(today); nextWeek.setDate(nextWeek.getDate() + 7);
        const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);

        let appointments = [];

        const statusColors = { Upcoming: 'bg-blue-100 text-blue-700', Completed: 'bg-emerald-100 text-emerald-700', Cancelled: 'bg-red-100 text-red-700' };
        const typeIcons = { clinic: '🏥', salon: '💇', consultant: '💼', lab: '🧪' };
        const chIcons = { wa: '<svg class="w-3.5 h-3.5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>', sms: '<svg class="w-3.5 h-3.5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>', em: '<svg class="w-3.5 h-3.5 text-violet-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>' };

        let apptFilter = 'all', apptSearchTerm = '', apptPage = 1;
        const APPT_PER_PAGE = 6;
        function updateStats() {

            const todayStr = fmt(today);

            const todayCount = appointments.filter(a =>
                a.date === todayStr &&
                a.status !== 'Cancelled'
            ).length;

            const upcomingCount = appointments.filter(a =>
                a.status === 'Upcoming'
            ).length;

            const completedCount = appointments.filter(a =>
                a.status === 'Completed'
            ).length;

            const cancelledCount = appointments.filter(a =>
                a.status === 'Cancelled'
            ).length;

            document.getElementById('stat-today').textContent =
                todayCount;

            document.getElementById('stat-upcoming').textContent =
                upcomingCount;

            document.getElementById('stat-completed').textContent =
                completedCount;

            document.getElementById('stat-cancelled').textContent =
                cancelledCount;
        }

        async function loadAppointments() {
            try {
                const res = await fetch('/appointments');
                const data = await res.json();

                appointments = data.map(a => ({
                    id: a.id,
                    customer: a.customerName || 'Unknown',
                    service: a.serviceName,
                    type: a.serviceType,
                    date: formatDate(a.appointmentDate),
                    time: formatTime(a.appointmentTime),
                    duration: a.durationMinutes + ' min',
                    channel: a.channel,
                    status: formatStatus(a.status),
                    notes: a.notes,
                    assignee: a.assignee
                }));
                updateStats();
                renderAppts();

            } catch (err) {
                console.error(err);
            }
        }

        function formatDate(date) {
            return new Date(date).toLocaleDateString('en-IN', {
                day: '2-digit',
                month: 'short',
                year: 'numeric'
            });
        }

        function formatTime(time) {
            return time ? time.substring(0, 5) : '';
        }

        function formatStatus(status) {
            return status === 'UPCOMING' ? 'Upcoming'
                : status === 'COMPLETED' ? 'Completed'
                    : 'Cancelled';
        }


        window.onload = () => {
            loadAppointments();
        };



        // ===================== FILTER + SEARCH =====================
        function filterAppts() {
            apptSearchTerm = (document.getElementById('apptSearch').value || '').toLowerCase().trim();
            apptPage = 1;
            renderAppts();
        }

        function getFilteredAppts() {
            return appointments.filter(a => {
                const matchFilter = apptFilter === 'all' || a.status.toLowerCase() === apptFilter || (apptFilter === 'today' && a.date === fmt(today) && a.status !== 'Cancelled');
                const matchSearch = !apptSearchTerm || a.customer.toLowerCase().includes(apptSearchTerm) || a.service.toLowerCase().includes(apptSearchTerm) || a.status.toLowerCase().includes(apptSearchTerm);
                return matchFilter && matchSearch;
            });
        }

        function setApptFilter(f) {
            apptFilter = f;
            apptPage = 1;
            ['all', 'today', 'upcoming', 'completed', 'cancelled'].forEach(x => {
                const b = document.getElementById('af-' + x);
                if (x === f) { b.className = 'px-3.5 py-1.5 rounded-full bg-indigo-600 text-white text-sm font-medium whitespace-nowrap'; }
                else { b.className = 'px-3.5 py-1.5 rounded-full border border-gray-200 text-gray-600 text-sm font-medium whitespace-nowrap hover:border-gray-300'; }
            });
            renderAppts();
        }

        // ===================== PAGINATION =====================
        function renderPagination(containerId, currentPage, total, perPage, goFn) {
            const el = document.getElementById(containerId);
            if (!el) return;
            const totalPages = Math.ceil(total / perPage);
            if (totalPages <= 1) { el.innerHTML = ''; return; }
            let maxV = 5, startP = Math.max(1, currentPage - 2), endP = Math.min(totalPages, startP + maxV - 1);
            if (endP - startP < maxV - 1) startP = Math.max(1, endP - maxV + 1);
            const prev = `<button onclick="${goFn}(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} class="w-8 h-8 flex items-center justify-center rounded-lg border border-gray-200 text-gray-500 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>`;
            let pages = '';
            for (let i = startP; i <= endP; i++) pages += `<button onclick="${goFn}(${i})" class="w-8 h-8 flex items-center justify-center rounded-lg text-sm font-medium ${i === currentPage ? 'bg-indigo-600 text-white' : 'border border-gray-200 text-gray-600 hover:bg-gray-50'}">${i}</button>`;
            const next = `<button onclick="${goFn}(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} class="w-8 h-8 flex items-center justify-center rounded-lg border border-gray-200 text-gray-500 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button>`;
            el.innerHTML = prev + pages + next;
        }

        function goApptPage(p) {
            const total = getFilteredAppts().length;
            const tp = Math.ceil(total / APPT_PER_PAGE);
            if (p < 1 || p > tp) return;
            apptPage = p;
            renderAppts();
        }

        // ===================== RENDER =====================
        function renderAppts() {
            const filtered = getFilteredAppts();
            const total = filtered.length;
            const start = (apptPage - 1) * APPT_PER_PAGE;
            const page = filtered.slice(start, start + APPT_PER_PAGE);
            const list = document.getElementById('apptList');
            list.innerHTML = '';

            document.getElementById('appt-count').textContent = total + ' appointment' + (total !== 1 ? 's' : '');
            if (total === 0) {
                document.getElementById('appt-page-label').textContent = 'No appointments found';
                list.innerHTML = `<div class="text-center py-16 bg-white rounded-2xl border border-gray-100"><div class="w-14 h-14 rounded-2xl bg-gray-100 flex items-center justify-center mx-auto mb-4"><svg class="w-7 h-7 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg></div><p class="text-sm font-semibold text-gray-500 mb-1">No appointments found</p><p class="text-xs text-gray-400">Try a different filter or search term</p></div>`;
                document.getElementById('appt-pagination').innerHTML = '';
                return;
            }
            document.getElementById('appt-page-label').textContent = `Showing ${start + 1}–${Math.min(start + APPT_PER_PAGE, total)} of ${total}`;

            page.forEach(a => {
                const isToday = a.date === fmt(today);
                list.innerHTML += `
          <div class="bg-white rounded-2xl border ${a.status === 'Cancelled' ? 'border-red-100' : 'border-gray-100'} shadow-sm p-4 hover:shadow-md transition cursor-pointer" onclick="window.location.href='appointment-detail.html?id=${a.id}'"  >
            <div class="flex items-start justify-between gap-3">
              <div class="flex items-start gap-3 flex-1 min-w-0">
                <div class="w-11 h-11 rounded-2xl ${a.status === 'Upcoming' ? 'bg-indigo-50' : a.status === 'Completed' ? 'bg-emerald-50' : 'bg-red-50'} flex items-center justify-center flex-shrink-0 text-xl">${typeIcons[a.type] || '📅'}</div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2 flex-wrap mb-0.5">
                    <p class="text-sm font-bold text-gray-900">${a.service}</p>
                    ${isToday ? '<span class="text-[10px] px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 font-semibold">Today</span>' : ''}
                    <span class="px-2 py-0.5 rounded-full text-[10px] font-semibold ${statusColors[a.status]}">${a.status}</span>
                  </div>
                  <p class="text-xs text-gray-600 font-medium">${a.customer}</p>
                  <div class="flex items-center gap-3 mt-1.5 flex-wrap">
                    <span class="flex items-center gap-1 text-xs text-gray-400"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>${a.date}</span>
                    <span class="flex items-center gap-1 text-xs text-gray-400"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>${a.time} · ${a.duration}</span>
                    ${a.assignee ? `<span class="flex items-center gap-1 text-xs text-gray-400"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>${a.assignee}</span>` : ''}
                  </div>
                </div>
              </div>
              <div class="flex flex-col items-end gap-2 flex-shrink-0">
                <div class="flex items-center gap-1">${chIcons[a.channel] || ''}</div>
                ${a.status === 'Upcoming' ? `
                <div class="flex items-center gap-1">
                  <button onclick="completeAppt(${a.id})" class="px-2.5 py-1 rounded-lg bg-emerald-50 text-emerald-600 text-xs font-semibold hover:bg-emerald-100 transition">Done</button>
                  <button onclick="cancelAppt(${a.id})" class="px-2.5 py-1 rounded-lg bg-red-50 text-red-500 text-xs font-semibold hover:bg-red-100 transition">Cancel</button>
                </div>` : ''}
              </div>
            </div>
            ${a.notes ? `<p class="text-xs text-gray-400 mt-3 pt-3 border-t border-gray-50">📝 ${a.notes}</p>` : ''}
          </div>`;
            });
            renderPagination('appt-pagination', apptPage, total, APPT_PER_PAGE, 'goApptPage');
        }

        async function completeAppt(id) {
            await fetch(`/appointments/${id}/status?status=COMPLETED`, {
                method: "PUT"
            });
            loadAppointments();
        }

        async function cancelAppt(id) {
            await fetch(`/appointments/${id}/status?status=CANCELLED`, {
                method: "PUT"
            });
            loadAppointments();
        }

        // ===================== FORM =====================
        let apptServiceType = 'clinic', apptDuration = '30 min', apptRemind = '1hr', apptChannel = 'wa';

        function selApptType(t) {
            apptServiceType = t;
            document.getElementById('apptType').value = t;
            ['clinic', 'salon', 'consultant'].forEach(x => {
                const b = document.getElementById('at-' + x);
                b.className = x === t ? 'flex flex-col items-center gap-1 py-2.5 rounded-2xl border-2 border-indigo-400 bg-indigo-50 text-xs font-semibold text-indigo-700 transition' : 'flex flex-col items-center gap-1 py-2.5 rounded-2xl border-2 border-gray-200 text-xs font-semibold text-gray-600 hover:border-gray-300 transition';
            });
        }
        function selDuration(d) {
            apptDuration = d;
            document.getElementById('apptDuration').value = d;
            ['15 min', '30 min', '45 min', '60 min'].forEach(x => {
                const id = 'dur-' + x.replace(' min', '');
                const b = document.getElementById(id);
                if (b) b.className = x === d ? 'py-2.5 rounded-xl border-2 border-indigo-500 bg-indigo-50 text-xs font-semibold text-indigo-700 transition' : 'py-2.5 rounded-xl border-2 border-gray-200 text-xs font-semibold text-gray-600 hover:border-indigo-300 transition';
            });
        }
        function selReminder(r) {
            apptRemind = r;
            document.getElementById('apptReminder').value = r;
            ['1hr', '2hr', '1day'].forEach(x => {
                const b = document.getElementById('rem-' + x);
                b.className = x === r ? 'py-2.5 rounded-xl border-2 border-indigo-500 bg-indigo-50 text-xs font-semibold text-indigo-700 transition' : 'py-2.5 rounded-xl border-2 border-gray-200 text-xs font-semibold text-gray-600 hover:border-indigo-300 transition';
            });
        }
        function selApptCh(ch) {
            apptChannel = ch;
            const map = { wa: 'bg-green-500', sms: 'bg-blue-500', em: 'bg-violet-500' };
            ['wa', 'sms', 'em'].forEach(c => {
                document.getElementById('ach-' + c).className = c === ch ? `flex-1 py-2.5 rounded-full text-sm font-semibold ${map[c]} text-white transition` : 'flex-1 py-2.5 rounded-full text-sm font-semibold bg-gray-100 text-gray-600 hover:bg-gray-200 transition';
            });
        }

        async function submitAppt(e) {
            e.preventDefault();

            const payload = {
                serviceName: document.getElementById('apptService').value,
                serviceType: apptServiceType,
                assignee: document.getElementById('apptAssignee').value,
                appointmentDate: document.getElementById('apptDate').value,
                appointmentTime: document.getElementById('apptTime').value,
                durationMinutes: parseInt(apptDuration),
                reminderType: apptRemind,
                channel: apptChannel,
                notes: document.getElementById('apptNotes').value
            };

            const customerId = document.getElementById('apptCustomer').value;

            try {
                const res = await fetch(`/appointments?customerId=${customerId}`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) throw new Error("Create failed");

                closeModal('createApptModal');

                await loadAppointments(); // reload from DB

                showToast("Appointment created ✅");

            } catch (err) {
                console.error(err);
                alert("Error creating appointment");
            }
        }
        // ===================== HELPERS =====================
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function showToast(msg) {
            const t = document.getElementById('successToast');
            document.getElementById('toastMsg').textContent = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3500);
        }
        function openMobileNav() { document.getElementById('mobileNavDrawer').style.transform = 'translateX(0)'; document.getElementById('mobileNavBg').classList.remove('hidden'); document.body.style.overflow = 'hidden'; }
        function closeMobileNav() { document.getElementById('mobileNavDrawer').style.transform = 'translateX(-100%)'; document.getElementById('mobileNavBg').classList.add('hidden'); document.body.style.overflow = ''; }

        renderAppts();
    </script>
</body>

</html>
