<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign In - Numen</title>
<script src="https://cdn.tailwindcss.com"></script>
<link
	href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
	rel="stylesheet" />
<script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#f0fdf4",
                100: "#dcfce7",
                200: "#bbf7d0",
                300: "#86efac",
                400: "#4ade80",
                500: "#48B26F",
                600: "#3a9360",
                700: "#15803d",
                800: "#166534",
                900: "#14532d",
              },
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>
</head>
<body class="font-sans antialiased bg-gray-50">
	<div
		class="min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8">
		<!-- Back link -->
		<div class="sm:mx-auto sm:w-full sm:max-w-md">
			<a href="index.html"
				class="inline-flex items-center text-gray-600 hover:text-brand-500 mb-8">
				<svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor"
					viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
						stroke-width="2" d="M15 19l-7-7 7-7"></path>
          </svg> Back to Home
			</a>
		</div>

		<div class="sm:mx-auto sm:w-full sm:max-w-md">
			<div class="flex justify-center mb-6">
				<img
					src="https://cdn.builder.io/api/v1/image/assets%2Ffbb0194a6d774fff8617236e5030fdfd%2F95b642517bf849079b5f6a616232ebb4?format=webp&width=800"
					alt="REMINDERme logo" class="w-[250px] h-auto object-contain" />
			</div>
			<h2 class="text-center text-3xl font-bold text-gray-900 mb-2">
				Welcome back</h2>
			<p class="text-center text-gray-600 mb-8">Sign in to your
				Numen account</p>
		</div>

		<div class="sm:mx-auto sm:w-full sm:max-w-md">
			<div
				class="bg-white py-8 px-4 shadow-lg sm:rounded-lg sm:px-10 border border-gray-200">
				<form class="space-y-6" method="post" role="form" th:action="@{/login}">
					<div>
						<label for="username"
							class="block text-sm font-medium text-gray-700">
							Phone Number or Email </label>
						<div class="mt-1">
							<input id="username" name="username" type="text" required
								class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md placeholder-gray-400 focus:outline-none focus:ring-brand-500 focus:border-brand-500"
								placeholder="Enter your phone number or email" />
						</div>
					</div>

					<div>
						<div class="flex items-center justify-between">
							<label for="password"
								class="block text-sm font-medium text-gray-700">
								Password </label>
							<div class="text-sm">
								<a href="#"
									class="font-medium text-brand-500 hover:text-brand-600">
									Forgot password? </a>
							</div>
						</div>
						<div class="mt-1 relative">
							<input id="password" name="password" type="password" required
								class="appearance-none block w-full px-3 py-2 pr-10 border border-gray-300 rounded-md placeholder-gray-400 focus:outline-none focus:ring-brand-500 focus:border-brand-500"
								placeholder="Enter your password" />
							<button type="button"
								class="absolute inset-y-0 right-0 pr-3 flex items-center"
								onclick="togglePassword('password')">
								<svg id="password-icon" class="h-5 w-5 text-gray-400"
									fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
										stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round"
										stroke-width="2"
										d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                  </svg>
							</button>
						</div>
					</div>

					<div class="flex items-center justify-between">
						<div class="flex items-center">
							<input id="remember-me" name="remember-me" type="checkbox"
								class="h-4 w-4 text-brand-600 focus:ring-brand-500 border-gray-300 rounded" />
							<label for="remember-me" class="ml-2 block text-sm text-gray-700">
								Remember me </label>
						</div>
					</div>

					<div>
						<button type="submit"
							class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-brand-500 hover:bg-brand-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-colors">
							Sign In</button>
					</div>

					<div class="relative">
						<div class="absolute inset-0 flex items-center">
							<div class="w-full border-t border-gray-300" />
						</div>
						<div class="relative flex justify-center text-sm">
							<span class="px-2 bg-white text-gray-500">or</span>
						</div>
					</div>

					<div class="grid grid-cols-2 gap-3">
						<button type="button"
							class="w-full inline-flex justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
							<svg class="w-5 h-5" viewBox="0 0 24 24">
                  <path fill="currentColor"
									d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                  <path fill="currentColor"
									d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                  <path fill="currentColor"
									d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                  <path fill="currentColor"
									d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
							<span class="ml-2">Google</span>
						</button>

						<button type="button"
							class="w-full inline-flex justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
							<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                  <path
									d="M24 4.557c-.883.392-1.832.656-2.828.775 1.017-.609 1.798-1.574 2.165-2.724-.951.564-2.005.974-3.127 1.195-.897-.957-2.178-1.555-3.594-1.555-3.179 0-5.515 2.966-4.797 6.045-4.091-.205-7.719-2.165-10.148-5.144-1.29 2.213-.669 5.108 1.523 6.574-.806-.026-1.566-.247-2.229-.616-.054 2.281 1.581 4.415 3.949 4.89-.693.188-1.452.232-2.224.084.626 1.956 2.444 3.379 4.6 3.419-2.07 1.623-4.678 2.348-7.29 2.04 2.179 1.397 4.768 2.212 7.548 2.212 9.142 0 14.307-7.721 13.995-14.646.962-.695 1.797-1.562 2.457-2.549z" />
                </svg>
							<span class="ml-2">Twitter</span>
						</button>
					</div>
				</form>

				<div class="mt-6 text-center">
					<p class="text-sm text-gray-600">
						Don't have an account? <a href="signup.html"
							class="font-medium text-brand-500 hover:text-brand-600">
							Sign up here </a>
					</p>
				</div>
			</div>
		</div>
	</div>

	<!-- Notification -->
	<div id="notification" class="fixed top-4 right-4 hidden z-50">
		<div class="bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg">
			<p id="notification-message"></p>
		</div>
	</div>

	<script src="/realsync-assets/remindme/js/app.js?v=2"></script>
	<script>
      async function hashPassword(p) {
        const data = new TextEncoder().encode(p);
        const hash = await crypto.subtle.digest("SHA-256", data);
        return Array.from(new Uint8Array(hash))
          .map((b) => b.toString(16).padStart(2, "0"))
          .join("");
      }
      // Show notification
      function showNotification(message, type = "error") {
        const notification = document.getElementById("notification");
        const messageEl = document.getElementById("notification-message");
        const container = notification.firstElementChild;

        messageEl.textContent = message;

        if (type === "success") {
          container.className =
            "bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg";
        } else {
          container.className =
            "bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg";
        }

        notification.classList.remove("hidden");

        setTimeout(() => {
          notification.classList.add("hidden");
        }, 5000);
      }

    </script>
</body>
</html>
