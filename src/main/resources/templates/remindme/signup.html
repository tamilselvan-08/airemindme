<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Numen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#f0fdf4",
                100: "#dcfce7",
                200: "#bbf7d0",
                300: "#86efac",
                400: "#4ade80",
                500: "#48B26F",
                600: "#3a9360",
                700: "#15803d",
                800: "#166534",
                900: "#14532d",
              },
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>
  </head>
  <body class="font-sans antialiased bg-gray-50">
    <div
      class="min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8"
    >
      <!-- Back link -->
      <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <a
          href="index.html"
          class="inline-flex items-center text-gray-600 hover:text-brand-500 mb-8"
        >
          <svg
            class="w-5 h-5 mr-2"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 19l-7-7 7-7"
            ></path>
          </svg>
          Back to Home
        </a>
      </div>

      <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <div class="flex justify-center mb-6">
          <img
            src="https://cdn.builder.io/api/v1/image/assets%2Ffbb0194a6d774fff8617236e5030fdfd%2F95b642517bf849079b5f6a616232ebb4?format=webp&width=800"
            alt="REMINDERme logo"
            class="w-[250px] h-auto object-contain"
          />
        </div>
        <h2 class="text-center text-3xl font-bold text-gray-900 mb-2">
          Create Your Account
        </h2>
        <p class="text-center text-gray-600 mb-8">
          Join thousands of businesses using Numen
        </p>
      </div>

      <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <div
          class="bg-white py-8 px-4 shadow-lg sm:rounded-lg sm:px-10 border border-gray-200"
        >
          <form id="signup-form" class="space-y-8">
            <!-- Section: Account Information -->
            <div class="space-y-4">
              <h3 class="text-base font-semibold text-gray-900">
                Basic information
              </h3>
              <div>
                <label
                  for="account-phone"
                  class="block text-sm font-medium text-gray-700"
                  >Phone Number *</label
                >
                <div class="mt-1 flex gap-2">
                  <select
                    id="country-code"
                    name="country-code"
                    class="w-24 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-brand-500 focus:border-brand-500"
                  >
                    <option value="+91" selected>+91</option>
                    <option value="+1">+1</option>
                    <option value="+44">+44</option>
                    <option value="+61">+61</option>
                  </select>
                  <input
                    id="account-phone"
                    name="account-phone"
                    type="tel"
                    required
                    class="flex-1 px-3 py-2 border border-gray-300 rounded-md placeholder-gray-400 focus:outline-none focus:ring-brand-500 focus:border-brand-500"
                    placeholder="Phone Number"
                  />
                </div>
              </div>

              <div>
                <label
                  for="password"
                  class="block text-sm font-medium text-gray-700"
                  >Password *</label
                >
                <div class="mt-1 relative">
                  <input
                    id="password"
                    name="password"
                    type="password"
                    required
                    minlength="6"
                    class="block w-full px-3 py-2 pr-10 border border-gray-300 rounded-md placeholder-gray-400 focus:outline-none focus:ring-brand-500 focus:border-brand-500"
                    placeholder="Password"
                  />
                  <button
                    type="button"
                    class="absolute inset-y-0 right-0 pr-3 flex items-center"
                    onclick="togglePassword('password')"
                  >
                    <svg
                      id="password-icon"
                      class="h-5 w-5 text-gray-400"
                      fill="none"
                      stroke="currentColor"
                      viewBox="0 0 24 24"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                      ></path>
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                      ></path>
                    </svg>
                  </button>
                </div>
              </div>

              <div>
                <label
                  for="confirm-password"
                  class="block text-sm font-medium text-gray-700"
                  >Confirm Password *</label
                >
                <div class="mt-1 relative">
                  <input
                    id="confirm-password"
                    name="confirm-password"
                    type="password"
                    required
                    class="block w-full px-3 py-2 pr-10 border border-gray-300 rounded-md placeholder-gray-400 focus:outline-none focus:ring-brand-500 focus:border-brand-500"
                    placeholder="Password"
                  />
                  <button
                    type="button"
                    class="absolute inset-y-0 right-0 pr-3 flex items-center"
                    onclick="togglePassword('confirm-password')"
                  >
                    <svg
                      id="confirm-password-icon"
                      class="h-5 w-5 text-gray-400"
                      fill="none"
                      stroke="currentColor"
                      viewBox="0 0 24 24"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                      ></path>
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                      ></path>
                    </svg>
                  </button>
                </div>
              </div>
            </div>

            <!-- Section: Business Information -->
            <div class="space-y-4">
              <h3 class="text-base font-semibold text-gray-900">
                Business information
              </h3>
              <div>
                <label
                  for="business-name"
                  class="block text-sm font-medium text-gray-700"
                  >Business Name *</label
                >
                <input
                  id="business-name"
                  name="business-name"
                  type="text"
                  required
                  class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md placeholder-gray-400 focus:outline-none focus:ring-brand-500 focus:border-brand-500"
                  placeholder="Business Name"
                />
              </div>

              <div>
                <label
                  for="category"
                  class="block text-sm font-medium text-gray-700"
                  >Category *</label
                >
                <select
                  id="category"
                  name="category"
                  required
                  class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-brand-500 focus:border-brand-500"
                >
                  <option value="">Select</option>
                  <option>Services</option>
                  <option>Retail</option>
                  <option>Food & Beverages</option>
                  <option>Health & Fitness</option>
                  <option>Others</option>
                </select>
              </div>

              <div>
                <label
                  for="subcategory"
                  class="block text-sm font-medium text-gray-700"
                  >Sub Category *</label
                >
                <input
                  id="subcategory"
                  name="subcategory"
                  list="subcategory-list"
                  required
                  class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md placeholder-gray-400 focus:outline-none focus:ring-brand-500 focus:border-brand-500"
                  placeholder="Search by keywords"
                />
                <datalist id="subcategory-list"></datalist>
              </div>

              <div>
                <label
                  for="email"
                  class="block text-sm font-medium text-gray-700"
                  >Email *</label
                >
                <input
                  id="email"
                  name="email"
                  type="email"
                  required
                  class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md placeholder-gray-400 focus:outline-none focus:ring-brand-500 focus:border-brand-500"
                  placeholder="Enter Email"
                />
              </div>

              <div>
                <label for="upi" class="block text-sm font-medium text-gray-700"
                  >Enter UPI ID *</label
                >
                <input
                  id="upi"
                  name="upi"
                  type="text"
                  required
                  class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md placeholder-gray-400 focus:outline-none focus:ring-brand-500 focus:border-brand-500"
                  placeholder="user@bank"
                />
              </div>
            </div>

            <!-- Collapsible: More Sections -->
            <details class="rounded-md border border-gray-200 p-4 bg-gray-50">
              <summary
                class="cursor-pointer select-none font-medium text-gray-900"
              >
                More Sections
              </summary>
              <div class="mt-4 grid grid-cols-1 gap-4">
                <h4 class="text-sm font-semibold text-gray-800">
                  Business Address
                </h4>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <div>
                    <label
                      for="door"
                      class="block text-sm font-medium text-gray-700"
                      >Door No</label
                    >
                    <input
                      id="door"
                      name="door"
                      type="text"
                      class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-brand-500 focus:border-brand-500"
                      placeholder="Door No"
                    />
                  </div>
                  <div>
                    <label
                      for="street"
                      class="block text-sm font-medium text-gray-700"
                      >Street</label
                    >
                    <input
                      id="street"
                      name="street"
                      type="text"
                      class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-brand-500 focus:border-brand-500"
                      placeholder="Street"
                    />
                  </div>
                  <div>
                    <label
                      for="zip"
                      class="block text-sm font-medium text-gray-700"
                      >Zip Code</label
                    >
                    <input
                      id="zip"
                      name="zip"
                      type="number"
                      class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-brand-500 focus:border-brand-500"
                      placeholder="Zip Code"
                    />
                  </div>
                  <div>
                    <label
                      for="country"
                      class="block text-sm font-medium text-gray-700"
                      >Country</label
                    >
                    <select
                      id="country"
                      name="country"
                      class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-brand-500 focus:border-brand-500"
                    >
                      <option value="IN" selected>India</option>
                      <option value="US">United States</option>
                      <option value="GB">United Kingdom</option>
                      <option value="AU">Australia</option>
                    </select>
                  </div>
                  <div class="sm:col-span-2">
                    <label
                      for="state"
                      class="block text-sm font-medium text-gray-700"
                      >State</label
                    >
                    <select
                      id="state"
                      name="state"
                      class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-brand-500 focus:border-brand-500"
                    ></select>
                  </div>
                </div>
              </div>
            </details>

            <div class="flex items-start">
              <div class="flex items-center h-5">
                <input
                  id="terms"
                  name="terms"
                  type="checkbox"
                  required
                  class="focus:ring-brand-500 h-4 w-4 text-brand-600 border-gray-300 rounded"
                />
              </div>
              <div class="ml-3 text-sm">
                <label for="terms" class="text-gray-700"
                  >I agree to the
                  <a href="#" class="text-brand-500 hover:text-brand-600"
                    >Terms and Conditions</a
                  >
                  and
                  <a href="#" class="text-brand-500 hover:text-brand-600"
                    >Privacy Policy</a
                  ></label
                >
              </div>
            </div>

            <div>
              <button
                type="submit"
                class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-semibold text-white bg-brand-500 hover:bg-brand-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-colors"
              >
                Register & Login
              </button>
            </div>

            <div class="relative">
              <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-300" />
              </div>
              <div class="relative flex justify-center text-sm">
                <span class="px-2 bg-white text-gray-500">or</span>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
              <button
                type="button"
                class="w-full inline-flex justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm bg-white text-sm font-medium text-gray-500 hover:bg-gray-50"
              >
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                  <path
                    fill="currentColor"
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                  />
                  <path
                    fill="currentColor"
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                  />
                  <path
                    fill="currentColor"
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                  />
                  <path
                    fill="currentColor"
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                  />
                </svg>
                <span class="ml-2">Google</span>
              </button>
              <button
                type="button"
                class="w-full inline-flex justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm bg-white text-sm font-medium text-gray-500 hover:bg-gray-50"
              >
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                  <path
                    d="M24 4.557c-.883.392-1.832.656-2.828.775 1.017-.609 1.798-1.574 2.165-2.724-.951.564-2.005.974-3.127 1.195-.897-.957-2.178-1.555-3.594-1.555-3.179 0-5.515 2.966-4.797 6.045-4.091-.205-7.719-2.165-10.148-5.144-1.29 2.213-.669 5.108 1.523 6.574-.806-.026-1.566-.247-2.229-.616-.054 2.281 1.581 4.415 3.949 4.89-.693.188-1.452.232-2.224.084.626 1.956 2.444 3.379 4.6 3.419-2.07 1.623-4.678 2.348-7.29 2.04 2.179 1.397 4.768 2.212 7.548 2.212 9.142 0 14.307-7.721 13.995-14.646.962-.695 1.797-1.562 2.457-2.549z"
                  />
                </svg>
                <span class="ml-2">Twitter</span>
              </button>
            </div>
          </form>

          <div class="mt-6 text-center">
            <p class="text-sm text-gray-600">
              Already have an account?
              <a
                href="signin.html"
                class="font-medium text-brand-500 hover:text-brand-600"
              >
                Sign in here
              </a>
            </p>
          </div>
        </div>
      </div>
    </div>

    <!-- Success Modal -->
    <div
      id="success-modal"
      class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden items-center justify-center"
    >
      <div class="bg-white rounded-lg p-6 max-w-sm mx-auto">
        <div
          class="flex items-center justify-center w-12 h-12 mx-auto bg-green-100 rounded-full mb-4"
        >
          <svg
            class="w-6 h-6 text-green-600"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M5 13l4 4L19 7"
            ></path>
          </svg>
        </div>
        <h3 class="text-lg font-medium text-gray-900 text-center mb-2">
          Account Created!
        </h3>
        <p class="text-sm text-gray-600 text-center mb-4">
          Your account has been successfully created. Please sign in to
          continue.
        </p>
        <button
          onclick="redirectToSignIn()"
          class="w-full bg-brand-500 hover:bg-brand-600 text-white py-2 px-4 rounded-md font-medium transition-colors"
        >
          Continue to Sign In
        </button>
      </div>
    </div>

    <!-- Notification -->
    <div id="notification" class="fixed top-4 right-4 hidden z-50">
      <div class="bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg">
        <p id="notification-message"></p>
      </div>
    </div>

    <script src="js/app.js?v=2"></script>
    <script>
      async function hashPassword(p) {
        const data = new TextEncoder().encode(p);
        const hash = await crypto.subtle.digest("SHA-256", data);
        return Array.from(new Uint8Array(hash))
          .map((b) => b.toString(16).padStart(2, "0"))
          .join("");
      }
      // Show notification
      function showNotification(message, type = "error") {
        const notification = document.getElementById("notification");
        const messageEl = document.getElementById("notification-message");
        const container = notification.firstElementChild;

        messageEl.textContent = message;

        if (type === "success") {
          container.className =
            "bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg";
        } else {
          container.className =
            "bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg";
        }

        notification.classList.remove("hidden");

        setTimeout(() => {
          notification.classList.add("hidden");
        }, 5000);
      }

      // Show success modal
      function showSuccessModal() {
        document.getElementById("success-modal").classList.remove("hidden");
        document.getElementById("success-modal").classList.add("flex");
      }

      // Redirect to sign in
      function redirectToSignIn() {
        window.location.href = "signin.html";
      }

      // Form validation and submission
      document
        .getElementById("signup-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const formData = new FormData(this);
          const data = {
            countryCode: formData.get("country-code"),
            phone: formData.get("account-phone"),
            password: formData.get("password"),
            confirmPassword: formData.get("confirm-password"),
            businessName: formData.get("business-name"),
            category: formData.get("category"),
            subcategory: formData.get("subcategory"),
            email: formData.get("email"),
            upi: formData.get("upi"),
            address: {
              door: formData.get("door"),
              street: formData.get("street"),
              zip: formData.get("zip"),
              country: formData.get("country"),
              state: formData.get("state"),
            },
            terms: formData.get("terms"),
          };

          if (
            !data.phone ||
            !data.password ||
            !data.confirmPassword ||
            !data.businessName ||
            !data.category ||
            !data.subcategory ||
            !data.email ||
            !data.upi
          ) {
            showNotification("Please fill in all required fields");
            return;
          }
          if (data.password !== data.confirmPassword) {
            showNotification("Passwords do not match");
            return;
          }
          if (data.password.length < 6) {
            showNotification("Password must be at least 6 characters long");
            return;
          }
          if (!data.terms) {
            showNotification("Please accept the terms and conditions");
            return;
          }

          const phoneRegex = /^[\+]?[1-9][\d]{5,15}$/;
          const fullPhone = (data.countryCode + data.phone).replace(
            /[\s\-\(\)]/g,
            "",
          );
          if (!phoneRegex.test(fullPhone)) {
            showNotification("Please enter a valid phone number");
            return;
          }
          const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if (!emailRegex.test(data.email)) {
            showNotification("Please enter a valid email address");
            return;
          }
          const upiRegex = /^[A-Za-z0-9.\-_]{2,}@[A-Za-z]{3,}$/;
          if (!upiRegex.test(data.upi)) {
            showNotification("Please enter a valid UPI ID (e.g., user@bank)");
            return;
          }

          const submitBtn = this.querySelector('button[type="submit"]');
          const originalText = submitBtn.textContent;
          submitBtn.textContent = "Registering...";
          submitBtn.disabled = true;

          setTimeout(() => {
            hashPassword(data.password).then((hashed) => {
              localStorage.setItem("reminderMe_password", hashed);
              localStorage.setItem(
                "reminderMe_user",
                JSON.stringify({
                  phone: data.countryCode + " " + data.phone,
                  email: data.email,
                  businessName: data.businessName,
                  category: data.category,
                  subcategory: data.subcategory,
                  upi: data.upi,
                  address: data.address,
                }),
              );
              localStorage.setItem("reminderMe_authenticated", "true");
              localStorage.setItem(
                "reminderMe_loginTime",
                new Date().toISOString(),
              );
              window.location.href = "dashboard.html";
            });
          }, 1200);
        });

      // Real-time password confirmation validation
      document
        .getElementById("confirm-password")
        .addEventListener("input", function () {
          const password = document.getElementById("password").value;
          const confirmPassword = this.value;
          if (confirmPassword && password !== confirmPassword) {
            this.setCustomValidity("Passwords do not match");
            this.classList.add("border-red-500");
            this.classList.remove("border-gray-300");
          } else {
            this.setCustomValidity("");
            this.classList.remove("border-red-500");
            this.classList.add("border-gray-300");
          }
        });

      // Country/state and subcategory helpers
      const statesByCountry = {
        IN: ["Tamil Nadu", "Karnataka", "Maharashtra", "Kerala", "Delhi"],
        US: ["California", "New York", "Texas", "Florida", "Washington"],
        GB: ["England", "Scotland", "Wales", "Northern Ireland"],
        AU: ["New South Wales", "Victoria", "Queensland", "Western Australia"],
      };
      function renderStates() {
        const country = document.getElementById("country").value;
        const stateEl = document.getElementById("state");
        stateEl.innerHTML = (statesByCountry[country] || [])
          .map((s) => `<option value="${s}">${s}</option>`)
          .join("");
      }
      document
        .getElementById("country")
        .addEventListener("change", renderStates);
      renderStates();

      const subcategories = {
        Services: [
          "Coaching / Training Centres",
          "Repair & Maintenance Services",
          "Photography / Videography Services",
          "Consulting",
        ],
        Retail: ["Grocery", "Electronics", "Clothing", "Furniture"],
        "Food & Beverages": [
          "Restaurants / Cafes / Bakeries",
          "Catering Services",
          "Food Trucks",
        ],
        "Health & Fitness": ["Fitness Centres / Gyms", "Yoga Studios", "Spa"],
        Others: ["Miscellaneous"],
      };
      function renderSubcategoryList() {
        const cat = document.getElementById("category").value || "Services";
        const list = document.getElementById("subcategory-list");
        list.innerHTML = (subcategories[cat] || [])
          .map((i) => `<option value="${i}"></option>`)
          .join("");
      }
      document
        .getElementById("category")
        .addEventListener("change", renderSubcategoryList);
      renderSubcategoryList();
    </script>
  </body>
</html>
